# Ejemplo de sitio Nginx para este proyecto Laravel (Webservice).
# Copiar a /etc/nginx/sites-available/ y ajustar: server_name, root, socket PHP-FPM.
#
# Comprobar:   sudo nginx -t
# Recargar:    sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name webservice.example.com 146.190.129.173;

    # OBLIGATORIO: apuntar al directorio public de Laravel, no al raíz del repo.
    root /var/www/webservice/public;

    index index.php;
    charset utf-8;

    # Webhooks / payloads grandes (ajusta si hace falta).
    client_max_body_size 25M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        # Si Nginx dice "connect() to unix:... failed": ajusta la ruta del socket
        # (ej. /run/php/php8.2-fpm.sock o /var/run/php/php8.3-fpm.sock).
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
